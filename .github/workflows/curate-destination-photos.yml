name: Curate destination photos

# Manually-triggered job that runs scripts/curate-destination-photos.mjs against
# the Unsplash demo tier (~5-6h). On success it opens a PR with the patched
# src/lib/destinationGuides.ts; the audit JSON is attached as an artifact for
# manual review before merging.

on:
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run curation script
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/curate-destination-photos.mjs

      - name: Upload audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-curation-audit
          path: /tmp/photo-curation-audit.json
          if-no-files-found: warn

      - name: Open PR with patched destinationGuides.ts
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if git diff --quiet -- src/lib/destinationGuides.ts; then
            echo "No changes to src/lib/destinationGuides.ts — skipping PR."
            exit 0
          fi

          BRANCH="curate-photos-${RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add src/lib/destinationGuides.ts
          git commit -m "Curated Unsplash photos for 38 fallback destinations"
          git push -u origin "$BRANCH"

          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          gh pr create \
            --title "Curated Unsplash photos for 38 fallback destinations" \
            --body "$(cat <<EOF
          Auto-generated by workflow run [#${RUN_NUMBER}](${RUN_URL}).

          Replaces every empty \`hero: ""\` and theme \`photo: ""\` placeholder
          across the 38 fallback entries in \`src/lib/destinationGuides.ts\` with
          full \`UnsplashPhotoMeta\` objects (url, photoId, photographer
          attribution, download_location).

          The per-entry audit JSON (\`photo-curation-audit.json\`) is attached as
          an artifact on the workflow run linked above — review it for any
          subject mismatches before merging.
          EOF
          )"

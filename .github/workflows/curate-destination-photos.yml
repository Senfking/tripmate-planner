name: Curate destination photos

# Manually-triggered job that runs scripts/curate-destination-photos.mjs against
# the Unsplash demo tier. The full curation takes ~5-6h, longer than GitHub's
# 6h job cap, so the script exits gracefully ~3min before the timeout-minutes
# limit and writes /tmp/curation-incomplete.flag instead of finishing. State
# (checkpoint + audit) is preserved across runs via actions/cache; subsequent
# manual triggers resume from where the previous run left off, until the run
# that finishes everything writes /tmp/curation-complete.flag and opens the PR.

on:
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 358
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore curation state
        # Cache key is unique per run so this run gets its own save slot.
        # restore-keys does a prefix match against the most recent save from
        # any prior run, so each manual trigger resumes the previous one.
        uses: actions/cache@v4
        with:
          path: |
            /tmp/curation-checkpoint.json
            /tmp/photo-curation-audit.json
          key: curation-progress-${{ github.run_id }}
          restore-keys: |
            curation-progress-

      - name: Run curation script
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          WORKFLOW_TIMEOUT_MINUTES: '358'
        run: node scripts/curate-destination-photos.mjs

      - name: Upload audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-curation-audit
          path: /tmp/photo-curation-audit.json
          if-no-files-found: warn

      - name: Open PR with patched destinationGuides.ts
        # Only run when the curation script signaled full completion. On
        # graceful early-exit (incomplete.flag) the workflow still succeeds
        # green and uploads the partial audit; Oliver re-triggers until done.
        if: success() && hashFiles('/tmp/curation-complete.flag') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if git diff --quiet -- src/lib/destinationGuides.ts; then
            echo "No changes to src/lib/destinationGuides.ts — skipping PR."
            exit 0
          fi

          BRANCH="curate-photos-${RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add src/lib/destinationGuides.ts
          git commit -m "Curated Unsplash photos for 38 fallback destinations"
          git push -u origin "$BRANCH"

          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          gh pr create \
            --title "Curated Unsplash photos for 38 fallback destinations" \
            --body "$(cat <<EOF
          Auto-generated by workflow run [#${RUN_NUMBER}](${RUN_URL}).

          Replaces every empty \`hero: ""\` and theme \`photo: ""\` placeholder
          across the 38 fallback entries in \`src/lib/destinationGuides.ts\` with
          full \`UnsplashPhotoMeta\` objects (url, photoId, photographer
          attribution, download_location).

          The per-entry audit JSON (\`photo-curation-audit.json\`) is attached as
          an artifact on the workflow run linked above — review it for any
          subject mismatches before merging.
          EOF
          )"

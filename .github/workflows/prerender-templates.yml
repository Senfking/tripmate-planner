name: Prerender template pages

# Captures the post-render HTML of every /templates/<slug> page from the
# live production site (https://junto.pro) and commits the snapshots to
# public/templates/<slug>/index.html so crawlers and social unfurlers see
# a fully-formed page before any JS executes.
#
# Lovable's static hosting is assumed to serve a request for
#   /templates/<slug>
# by checking for public/templates/<slug>/index.html first and falling
# back to the SPA shell (index.html) when no static file matches. Verify
# this assumption end-to-end via the curl step below before relying on it.

on:
  push:
    branches: [main]
    paths:
      - "src/lib/destinationGuides.ts"
      - "src/components/seo/**"
      - "src/pages/TemplateDetail.tsx"
      - "public/sitemap.xml"
  workflow_dispatch:

concurrency:
  group: prerender-templates
  cancel-in-progress: false

jobs:
  prerender:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main (fresh)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install puppeteer (with bundled Chromium)
        run: npm install --no-save puppeteer@^23

      - name: Prerender all template pages
        env:
          BASE_URL: https://junto.pro
          CONCURRENCY: "3"
          NAV_TIMEOUT_MS: "60000"
        run: node scripts/prerender-templates.mjs

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- public/templates; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat -- public/templates
          fi

      - name: Commit refreshed snapshots to a PR branch
        id: commit
        if: steps.diff.outputs.changed == 'true'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          BRANCH="prerender-templates-${RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/templates
          git commit -m "Prerender: refresh template snapshots [skip ci]"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Prerender: refresh template snapshots" \
            --body "$(cat <<EOF
          Auto-generated by workflow run [#${RUN_NUMBER}](${RUN_URL}).

          Refreshes \`public/templates/<slug>/index.html\` for every entry in
          \`DESTINATION_GUIDES\` by capturing the post-render HTML of
          \`https://junto.pro/templates/<slug>\` via Puppeteer (network-idle +
          stable \`TouristTrip\` JSON-LD marker).

          ## Why
          The SPA only renders content after React mounts. LLM crawlers and
          social unfurlers (Slack, LinkedIn, X) don't wait for JS, so they
          see the empty shell. Static snapshots fix the SEO + unfurl story.

          ## Hosting assumption (please verify before merge)
          We assume Lovable's static hosting serves
          \`public/templates/<slug>/index.html\` directly when the request
          path is \`/templates/<slug>\`, and falls back to the SPA shell
          (\`index.html\`) for any path without a matching static file. If
          that's wrong (e.g. Lovable always serves the SPA shell, or has a
          rewrite rule that intercepts \`/templates/*\`), these snapshots
          ship dead weight and the SEO work needs a different vehicle
          (e.g. a server-side rewrite, prerender.io, or Cloudflare Worker).

          The verification step in the workflow run above does a real
          \`curl https://junto.pro/templates/tulum-5-days\` and greps the
          raw HTML response for both the \`<title>\` and the \`TouristTrip\`
          JSON-LD. If the workflow ran green after this PR's snapshots
          deployed, the assumption holds.

          ## Do not auto-merge
          Hold this PR until the photo-curation auto-PR lands so snapshots
          capture curated Unsplash photos rather than placeholders.
          EOF
          )"

      - name: Verify deployed snapshot (canary)
        # Always runs after the commit/PR step. Pulls the live page from
        # production and grep-fails if the prerendered title or TouristTrip
        # JSON-LD is missing. Note: until the PR is merged AND deployed,
        # this verifies whatever is currently live (which is the previous
        # snapshot or, on first run, the SPA shell). Treat a failure on
        # first-run as expected; treat a failure on subsequent runs as a
        # regression.
        if: always()
        run: |
          set -euo pipefail
          URL="https://junto.pro/templates/tulum-5-days"
          echo "Fetching $URL"
          BODY="$(curl -fsSL --retry 3 --retry-delay 2 -A 'JuntoPrerenderVerify/1.0' "$URL")"
          echo "Response bytes: ${#BODY}"

          MISSING=0
          if ! grep -qiE '<title>[^<]*Tulum[^<]*</title>' <<<"$BODY"; then
            echo "::error ::Expected <title> containing 'Tulum' not found in raw HTML"
            MISSING=1
          fi
          if ! grep -q '"TouristTrip"' <<<"$BODY"; then
            echo "::error ::Expected TouristTrip JSON-LD not found in raw HTML"
            MISSING=1
          fi

          if [ "$MISSING" -ne 0 ]; then
            echo "::error ::Verification failed — Lovable hosting may not be serving public/templates/<slug>/index.html for this path. Check the hosting-assumption note in the PR description."
            exit 1
          fi
          echo "Verification OK: title + TouristTrip JSON-LD present in raw HTML."

project_id = "dwtbqomfleihcvkfoopm"

[functions]
  [functions.auth-email-hook]
    verify_jwt = false
  [functions.process-email-queue]
    verify_jwt = true
  # Locked behind verify_jwt + an internal SUPABASE_SERVICE_ROLE_KEY bearer
  # check (see supabase/functions/check-admin-alerts/index.ts). Anonymous
  # / regular-user JWTs are rejected.
  [functions.check-admin-alerts]
    verify_jwt = true
  # Authenticated, rate-limited gateway that fronts the admin Twilio + notification
  # path for the FRONTEND feedback widget. See
  # supabase/functions/submit-feedback-alert/index.ts.
  [functions.submit-feedback-alert]
    verify_jwt = true
  # MVP visa / entry requirements lookup. See
  # supabase/functions/get-entry-requirements/index.ts.
  [functions.get-entry-requirements]
    verify_jwt = true
  # Locked behind verify_jwt + an internal SUPABASE_SERVICE_ROLE_KEY bearer
  # check (see supabase/functions/send-push-notification/index.ts). Called
  # only by DB triggers in
  # supabase/migrations/20260404100000_push_notification_triggers.sql.
  [functions.send-push-notification]
    verify_jwt = true
  # Public read of an anonymous_trips row for the /trips/anon/[id] page.
  [functions.get-anonymous-trip]
    verify_jwt = false

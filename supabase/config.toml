project_id = "dwtbqomfleihcvkfoopm"

[functions]
  [functions.auth-email-hook]
    verify_jwt = false
  [functions.process-email-queue]
    verify_jwt = true
  # Locked behind verify_jwt + an internal SUPABASE_SERVICE_ROLE_KEY bearer
  # check (see supabase/functions/check-admin-alerts/index.ts). Anonymous
  # / regular-user JWTs are rejected.
  [functions.check-admin-alerts]
    verify_jwt = true
  # Authenticated, rate-limited gateway that fronts the admin Twilio + notification
  # path for the FRONTEND feedback widget. See
  # supabase/functions/submit-feedback-alert/index.ts.
  [functions.submit-feedback-alert]
    verify_jwt = true
  # MVP visa / entry requirements lookup. See
  # supabase/functions/get-entry-requirements/index.ts.
  [functions.get-entry-requirements]
    verify_jwt = true
  # Locked behind verify_jwt + an internal SUPABASE_SERVICE_ROLE_KEY bearer
  # check (see supabase/functions/send-push-notification/index.ts). Called
  # only by DB triggers in
  # supabase/migrations/20260404100000_push_notification_triggers.sql.
  [functions.send-push-notification]
    verify_jwt = true
  # Public read of an anonymous_trips row for the /trips/anon/[id] page.
  [functions.get-anonymous-trip]
    verify_jwt = false
  # Public anon itinerary view for /share/:token/itinerary.
  [functions.public-trip-share-itinerary]
    verify_jwt = false
  # Public minimal trip share landing /share/:token.
  [functions.public-trip-share-view]
    verify_jwt = false
  # Place-details lookup for activity cards. Platform JWT verification is
  # kept ON (anon key or session both accepted) — the function relies on
  # that gate plus a service-role client for cache writes, and intentionally
  # does NOT require a logged-in user because TripResultsView renders on
  # both authed (AIPlan/TripHome) and public (AnonTripView/TemplateDetail)
  # routes. See supabase/functions/get-place-details/index.ts.
  [functions.get-place-details]
    verify_jwt = true
  # Public utility — fetches public FX data from open.er-api.com and
  # upserts the shared exchange_rate_cache via service role. No per-user
  # data; called on app boot from useExpenses/fetchCrossRates where the
  # session may not yet be restored.
  [functions.refresh-exchange-rates]
    verify_jwt = false
